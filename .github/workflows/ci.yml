# .github/workflows/ci.yml
name: Python CI/CD Pipeline

# 触发条件：推送到main分支、提交PR时自动运行
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置Python环境（直接用最新稳定版，或指定3.11）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3. 运行单元测试（去掉了安装依赖步骤，因为本项目无第三方依赖）
    - name: Run unit tests
      run: |
        python -m unittest test_calc.py -v